name: Build and Push Runner Image

on:
  schedule:
    # Check for new upstream releases daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      runner_version:
        description: "Runner version to build (e.g. 2.334.0). Leave empty to auto-detect latest."
        required: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  check:
    runs-on: ubicloud-standard-2
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.runner_version }}" ]]; then
            VERSION="${{ inputs.runner_version }}"
          else
            VERSION=$(gh api repos/falcondev-oss/github-actions-runner/releases/latest --jq '.tag_name' | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Check if we already published this tag
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $(echo "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)" \
            "https://ghcr.io/v2/${GITHUB_REPOSITORY,,}/manifests/${VERSION}")

          if [[ "$STATUS" == "200" ]]; then
            echo "Tag ${VERSION} already exists, skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${VERSION} not found (HTTP ${STATUS}), will build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubicloud-standard-2
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            RUNNER_VERSION=${{ needs.check.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
